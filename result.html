<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Resultado da Transmissão
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>
    <div class="app-layout">
        <aside class="sidebar-header">
            <img src="./images/osiModel.jpg" alt="Modelo OSI" class="header-photo">
            <h1 class="title">Projeto de Redes</h1>
            <p class="subtitle">Resultados (OSI)</p>
            <div class="user-box">
                <a href="index.html" class="logout-btn" style="text-align:center; display:block; text-decoration: none;">Nova Transmissão</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="resultado-container">
                <h1>Simulação Completa do Modelo OSI</h1>
                <h2>Dados Processados</h2>
                
                <div id="dados-conteudo" class="dados-box">
                </div>

                <div class="network-container">
                    <h2>Roteamento na Camada de Rede</h2>
                    <canvas id="networkCanvas" width="1000" height="600"></canvas>
                </div>

                <div class="actions-container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <a href="index.html" class="voltar-btn">Voltar ao Início</a>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <script type="module" src="scripts/result.js"></script>
</body>

</html>
