<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo OSI</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar-header">
            <img src="./images/osiModel.jpg" alt="Modelo OSI" class="header-photo">
            <h1 class="title">Projeto de Redes</h1>
            <p class="subtitle">Modelo OSI</p>
            <div class="user-box">
                <p class="user"></p>
                <button id="btn-logout" class="logout-btn">Trocar Usuário</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="search-section">
                <div class="request-wrapper">
                    <h2>Nova Transmissão</h2>
                    <div class="input-row">
                        <input type="text" placeholder="Ex: ws://chat, www.site.com, @email..." class="text-input input-field">
                        <button type="submit" class="request-btn">Verificar Protocolo</button>
                    </div>

                    <div class="upload-section">
                        <label for="arquivo">Arquivo Rápido (FTP):</label>
                        <input type="file" id="arquivo">
                    </div>
                </div>

                <div class="protocol-response-wrapper">
                    <h1 class="protocol-response"></h1>
                </div>
            </div>

            <div class="forms-section">
                <form class="email-form hidden">
                    <h2 class="form-title">Serviço de Correio (SMTP)</h2>

                    <div class="form-group">
                        <label for="remetente">Remetente:</label>
                        <input type="email" id="remetente" class="input-field" placeholder="voce@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="destinatario">Destinatário:</label>
                        <input type="email" id="destinatario" class="input-field" placeholder="destino@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="assunto">Assunto:</label>
                        <input type="text" id="assunto" class="input-field" placeholder="Título" required>
                    </div>

                    <div class="form-group">
                        <label for="corpo">Mensagem:</label>
                        <textarea id="corpo" class="input-field textarea-field" placeholder="Escreva aqui..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="protocolo">Protocolo Detectado:</label>
                        <input type="text" id="protocolo" class="input-field" value="SMTP" readonly>
                    </div>

                    <button type="submit" class="request-btn">Disparar E-mail</button>
                </form>

                <form class="chat-form hidden">
                    <h2 class="form-title">Serviço de Chat Instantâneo (WebSocket)</h2>

                    <div class="form-group">
                        <label for="chat-destinatario">Enviar para:</label>
                        <input type="text" id="chat-destinatario" class="input-field" placeholder="Contato..." required>
                    </div>

                    <div class="form-group">
                        <label for="chat-mensagem">Mensagem:</label>
                        <textarea id="chat-mensagem" class="input-field textarea-field" placeholder="Sua mensagem..." required></textarea>
                    </div>

                    <button type="submit" class="request-btn">Transmitir Chat</button>
                </form>

                <form class="site-form hidden">
                    <h2 class="form-title">Requisição Web (HTTP/HTTPS)</h2>

                    <div class="form-group">
                        <label for="site-metodo">Verbo HTTP:</label>
                        <select id="site-metodo" class="input-field">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="site-host">Domínio / Host:</label>
                        <input type="text" id="site-host" class="input-field" readonly>
                    </div>

                    <button type="submit" class="request-btn">Fazer Requisição</button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <script type="module" src="scripts/application.js"></script>
</body>

</html>
